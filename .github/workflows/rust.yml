name: Rust CI/CD

on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  NDI_SDK_URL: ${{ secrets.NDI_SDK_URL || 'https://downloads.ndi.tv/SDK/NDI_SDK/NDI%206%20SDK.exe' }}
  NDI_SDK_URL_MACOS: ${{ secrets.NDI_SDK_URL_MACOS || 'https://downloads.ndi.tv/SDK/NDI_SDK_Mac/Install_NDI_SDK_v6_Apple.pkg' }}
  NDI_SDK_URL_LINUX: ${{ secrets.NDI_SDK_URL_LINUX || 'https://downloads.ndi.tv/SDK/NDI_SDK_Linux/Install_NDI_SDK_v6_Linux.tar.gz' }}
  LLVM_VERSION: "20.1.8"
  CACHE_VERSION: v1

jobs:
  # Quick format check (no dependencies needed)
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Combined setup and test job
  test-and-lint:
    name: Test & Lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # Setup NDI SDK (Windows)
      - uses: ./.github/actions/setup-ndi-windows
        if: runner.os == 'Windows'
        with:
          save-cache: 'true'

      # Setup NDI SDK (macOS)
      - uses: ./.github/actions/setup-ndi-macos
        if: runner.os == 'macOS'
        with:
          save-cache: 'true'

      # Setup NDI SDK (Linux)
      - uses: ./.github/actions/setup-ndi-linux
        if: runner.os == 'Linux'
        with:
          save-cache: 'true'

      # Setup Rust
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Rust caching with optimizations
      - uses: Swatinem/rust-cache@v2
        with:
          # Don't cache the entire target directory, just dependencies
          cache-targets: false
          # Use a shared cache key to avoid saving the same dependencies multiple times
          shared-key: "rust-cache-${{ matrix.os }}"
          # Only save cache on main branch to avoid cache thrashing
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Run all checks
      - name: Run tests
        run: |
          # First run diagnostic tests on Windows
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "Running Windows DLL diagnostics..."
            cargo test --test windows_dll_check -- --nocapture
            cargo test --test diagnose_windows_ci test_ndi_environment -- --nocapture
          fi

          # Run all tests including integration tests
          # The NDI runtime libraries are now available via the setup actions
          cargo test --verbose
        shell: bash
        env:
          TMPDIR: ${{ runner.temp }}

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Build examples
        run: cargo build --examples

      # Documentation lint runs once; rustdoc lints are platform-independent.
      - name: Check documentation
        if: matrix.os == 'ubuntu-latest'
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  # Semver check runs on all platforms
  semver:
    name: Check semver
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # Setup NDI SDK (Windows)
      - uses: ./.github/actions/setup-ndi-windows
        if: runner.os == 'Windows'
        with:
          save-cache: 'false'

      # Setup NDI SDK (macOS)
      - uses: ./.github/actions/setup-ndi-macos
        if: runner.os == 'macOS'
        with:
          save-cache: 'false'

      # Setup NDI SDK (Linux)
      - uses: ./.github/actions/setup-ndi-linux
        if: runner.os == 'Linux'
        with:
          save-cache: 'false'

      - uses: dtolnay/rust-toolchain@stable

      # Rust caching - read-only, don't save
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          shared-key: "rust-cache-${{ matrix.os }}"
          save-if: false  # Let test-and-lint job handle saving

      - uses: obi1kenobi/cargo-semver-checks-action@v2

  # Build and publish API documentation to GitHub Pages.
  #
  # docs.rs cannot build this crate: bindgen generates the FFI bindings from the
  # NDI SDK headers at build time, and the NDI SDK license forbids redistributing
  # those headers (or bindings derived from them). Docs are therefore generated
  # here, where a licensed SDK is installed, and self-hosted on GitHub Pages.
  docs:
    name: Publish docs
    needs: [test-and-lint, semver]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-ndi-linux
        with:
          save-cache: 'false'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          shared-key: "rust-cache-ubuntu-latest"
          save-if: false

      - name: Build documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

      # docs.rs serves the crate root; replicate that with a redirect so the
      # Pages root lands on the crate documentation.
      - name: Add root redirect to crate docs
        run: echo '<meta http-equiv="refresh" content="0; url=grafton_ndi/index.html">' > target/doc/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Publish job
  publish:
    name: Publish
    needs: [format, test-and-lint, semver]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # Setup NDI SDK and LLVM
      - uses: ./.github/actions/setup-ndi-windows
        with:
          save-cache: 'false'

      - uses: dtolnay/rust-toolchain@stable

      # Rust caching - read-only for publish job
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          shared-key: "rust-cache-windows"
          save-if: false  # Don't save cache in publish job

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
